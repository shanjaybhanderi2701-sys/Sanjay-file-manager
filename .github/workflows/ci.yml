name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew --no-daemon --stacktrace ktlintCheck

      - name: detekt
        run: ./gradlew --no-daemon --stacktrace detekt

      - name: Module dependency rules
        run: ./gradlew --no-daemon --stacktrace checkModuleDependencies

      - name: Android Lint
        run: ./gradlew --no-daemon --stacktrace lint

      - name: Unit tests
        run: ./gradlew --no-daemon --stacktrace testStandardDebugUnitTest testDebugUnitTest test

      - name: Assemble (standard debug)
        run: ./gradlew --no-daemon --stacktrace assembleStandardDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          if-no-files-found: ignore
          retention-days: 7
