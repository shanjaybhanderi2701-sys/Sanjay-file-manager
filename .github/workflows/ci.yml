name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ktlint
        run: ./gradlew --no-daemon --stacktrace ktlintCheck

      - name: detekt
        run: ./gradlew --no-daemon --stacktrace detekt

      - name: Module dependency rules
        run: ./gradlew --no-daemon --stacktrace checkModuleDependencies

      - name: Android Lint
        run: ./gradlew --no-daemon --stacktrace lint

      - name: Unit tests
        run: ./gradlew --no-daemon --stacktrace testStandardDebugUnitTest testDebugUnitTest test

      - name: Assemble (standard debug)
        run: ./gradlew --no-daemon --stacktrace assembleStandardDebug

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          if-no-files-found: ignore
          retention-days: 7

  coverage:
    name: Coverage · Kover (T170)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Aggregated coverage report across core-* and feature-* modules (JVM — no emulator).
      - name: Kover aggregated report
        run: ./gradlew --no-daemon --stacktrace koverXmlReport koverHtmlReport

      # Threshold enforcement is a Product Manager decision (APP-36 interaction c51ac274).
      # The placeholder bounds (50% overall, 70% core-domain/core-data) are wired in
      # build.gradle.kts but kept NON-BLOCKING until PM confirms. To turn the gate on,
      # remove `continue-on-error` (and adjust the bounds to the confirmed values).
      - name: Kover verify (placeholder thresholds — non-blocking pending PM)
        continue-on-error: true
        run: ./gradlew --no-daemon --stacktrace koverVerify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/kover/
          if-no-files-found: ignore
          retention-days: 14

  screenshots:
    name: Screenshot · Roborazzi (T171)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # APP-154: Linux goldens are now committed under core/core-ui/src/test/screenshots/
    # (recorded on this same ubuntu-latest/Robolectric image). Kept advisory for ONE
    # confirming cycle to prove `verifyRoborazziDebug` is green against them before this
    # `continue-on-error` is dropped and the job is promoted to a required gate.
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Verifies core-ui component snapshots (light/dark/dynamic + content/loading/empty/
      # error) against the committed Linux goldens. JVM-only via Robolectric — no emulator.
      # Goldens were recorded on this same ubuntu-latest image (APP-154); refresh them with
      # `./gradlew :core:core-ui:recordRoborazziDebug` (see docs/phase-1/testing/screenshot-and-coverage.md).
      - name: Verify screenshots
        run: ./gradlew --no-daemon --stacktrace :core:core-ui:verifyRoborazziDebug

      - name: Upload screenshot diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: core/core-ui/build/outputs/roborazzi/
          if-no-files-found: ignore
          retention-days: 7

  release-size:
    name: Release · R8 · Size budget (NFR-9.1)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Builds the minified, non-debuggable standard release APK (R8 full mode) and
      # hard-fails if it exceeds the 12 MB NFR-9.1 budget. Uses the debug-keystore
      # fallback in :app signingConfigs, so no release secrets are needed in CI.
      - name: Verify release size budget
        run: ./gradlew --no-daemon --stacktrace verifyStandardReleaseSizeBudget

      - name: Upload release mapping + APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            app/build/outputs/apk/standard/release/*.apk
            app/build/outputs/mapping/standardRelease/mapping.txt
          if-no-files-found: ignore
          retention-days: 7

  baseline-profile:
    name: Baseline profile · Startup benchmark (NFR-1.1)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # NFR-1.1 gate — task-name bug fixed (APP-148). The emulator boots fine on the
    # GitHub-hosted runner ("Boot completed" in the runner log); the prior failures
    # were a task-name bug, not emulator flakiness — the script invoked
    # ':baselineprofile:generateBaselineProfile', but the androidx baseline-profile
    # plugin registers generation on the consumer :app module (flavour-aware), so the
    # real task is ':app:generateStandardBaselineProfile'.
    # Promoted to a hard-blocking gate (APP-153 / APP-147 phase 2): the corrected job
    # was observed green on a push-to-main run (run 28518687488, main@3cf928e) — the
    # emulator booted and the startup benchmark ran to success — so `continue-on-error`
    # is removed and this job is now required.
    # Generates the baseline profile and measures cold start on a managed emulator.
    # Runs on push to main (and manual dispatch) — too heavy for every PR.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM is required for hardware-accelerated emulation on ubuntu-latest.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Generate the baseline profile, then run the cold-start macrobenchmark.
      # The generated baseline-prof.txt is written into app/src/standard/generated/.
      - name: Generate baseline profile + startup benchmark
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            ./gradlew --no-daemon --stacktrace :app:generateStandardBaselineProfile
            ./gradlew --no-daemon --stacktrace :baselineprofile:connectedStandardBenchmarkReleaseAndroidTest

      - name: Upload baseline profile + benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-profile
          path: |
            app/src/standard/generated/baselineProfiles/*.txt
            **/build/outputs/connected_android_test_additional_output/
            **/build/outputs/androidTest-results/
          if-no-files-found: ignore
          retention-days: 14

  instrumented-matrix:
    name: Instrumented · ${{ matrix.label }} (NFR-4)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # NFR-4 device matrix: runs connectedStandardDebugAndroidTest across the
    # legacy scoped-storage, baseline phone, and large-screen tablet targets.
    # Emulator boots are heavy, so gate to push/dispatch (not every PR) — same
    # policy as baseline-profile. Provisioned in-house on GH Actions per APP-110.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      # Don't let one image failing mask the others — each target reports on its own.
      fail-fast: false
      matrix:
        include:
          # Legacy / scoped-storage flows (NFR-4.2) — highest functional risk.
          - label: API30 phone (scoped storage)
            api-level: 30
            target: google_apis
            profile: pixel_6
          # Baseline phone — core flows.
          - label: API35 phone
            api-level: 35
            target: google_apis
            profile: pixel_6
          # Large-screen / partial-media UI.
          - label: API35 tablet
            api-level: 35
            target: google_apis
            profile: pixel_tablet
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # KVM is required for hardware-accelerated emulation on ubuntu-latest.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Runs the instrumented (androidTest) suite on this matrix target. Safe/green
      # when only the APP-82 AccessibilityTest (or no charters) exist — Gradle exits
      # 0 with zero connected tests; QA lands more charters against this same matrix.
      - name: Instrumented tests (${{ matrix.label }})
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          # x86_64 + google_apis (NOT playstore) is required for API 30 images.
          arch: x86_64
          profile: ${{ matrix.profile }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            ./gradlew --no-daemon --stacktrace connectedStandardDebugAndroidTest connectedDebugAndroidTest

      - name: Upload instrumented test results (${{ matrix.label }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Slashes/spaces aren't allowed in artifact names — key on api-level + profile.
          name: androidTest-results-api${{ matrix.api-level }}-${{ matrix.profile }}
          path: |
            **/build/outputs/androidTest-results/
            **/build/reports/androidTests/
            **/build/outputs/connected_android_test_additional_output/
          if-no-files-found: ignore
          retention-days: 14
