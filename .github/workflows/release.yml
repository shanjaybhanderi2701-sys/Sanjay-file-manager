name: Release · Signed AAB · Staged rollout

# T7.8 GA staged rollout (APP-88). Builds the signed release AAB and — when Play
# credentials are configured — promotes it through the staged rollout described in
# docs/phase-1/ga-rollout-runbook.md (10% → 25% → 50% → 100%).
#
# Two entry points:
#   * push of a `v*` tag  → build AAB, upload to the `internal` track (first hop).
#   * workflow_dispatch    → pick `track` + `userFraction` to advance a staged
#                            rollout (each promotion is a deliberate manual step,
#                            per Release Plan §7 "manual promote").
#
# The Play upload step is credential-gated: without the PLAY_SERVICE_ACCOUNT_JSON
# secret the workflow still builds + uploads the AAB as a CI artifact and cleanly
# skips the Play publish, so this is safe to merge before ops provisions the
# service account. Mirrors the debug-keystore signing fallback in :app.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      track:
        description: 'Play track to publish to'
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
      userFraction:
        description: 'Staged rollout fraction for production (0.10 / 0.25 / 0.50 / 1.0)'
        type: string
        default: '0.10'

permissions:
  contents: read

jobs:
  release:
    name: Build signed AAB + staged promote
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Secrets can't be used directly in `if:`; surface presence as a plain env flag.
      HAS_PLAY_CREDS: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON != '' && 'true' || 'false' }}
      HAS_RELEASE_KEYSTORE: ${{ secrets.FILORA_RELEASE_STORE_BASE64 != '' && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Materialize the upload keystore from a base64 secret when present. Without
      # it, :app signingConfigs fall back to the debug keystore so the AAB still
      # builds (never shippable to production, but keeps CI green pre-provisioning).
      - name: Restore release keystore
        if: env.HAS_RELEASE_KEYSTORE == 'true'
        run: echo "${{ secrets.FILORA_RELEASE_STORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/filora-release.jks"

      - name: Build signed release bundle (AAB)
        env:
          FILORA_RELEASE_STORE_FILE: ${{ env.HAS_RELEASE_KEYSTORE == 'true' && format('{0}/filora-release.jks', runner.temp) || '' }}
          FILORA_RELEASE_STORE_PASSWORD: ${{ secrets.FILORA_RELEASE_STORE_PASSWORD }}
          FILORA_RELEASE_KEY_ALIAS: ${{ secrets.FILORA_RELEASE_KEY_ALIAS }}
          FILORA_RELEASE_KEY_PASSWORD: ${{ secrets.FILORA_RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon --stacktrace bundleStandardRelease

      - name: Upload AAB + mapping as CI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: |
            app/build/outputs/bundle/standardRelease/*.aab
            app/build/outputs/mapping/standardRelease/mapping.txt
          if-no-files-found: warn
          retention-days: 30

      - name: Warn if Play credentials are not configured
        if: env.HAS_PLAY_CREDS != 'true'
        run: |
          echo "::warning title=Play publish skipped::PLAY_SERVICE_ACCOUNT_JSON secret is not set. Built the signed AAB as an artifact but did not promote to Google Play. Provision the service account (ops) to enable staged rollout — see docs/phase-1/ga-rollout-runbook.md."

      # Staged rollout: a tag push seeds the `internal` track; manual dispatch
      # advances `production` at the chosen userFraction (10 → 25 → 50 → 100%).
      - name: Promote to Google Play
        if: env.HAS_PLAY_CREDS == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.appblish.filora
          releaseFiles: app/build/outputs/bundle/standardRelease/*.aab
          mappingFile: app/build/outputs/mapping/standardRelease/mapping.txt
          track: ${{ github.event_name == 'workflow_dispatch' && inputs.track || 'internal' }}
          status: ${{ (github.event_name == 'workflow_dispatch' && inputs.track == 'production' && inputs.userFraction != '1.0') && 'inProgress' || 'completed' }}
          userFraction: ${{ (github.event_name == 'workflow_dispatch' && inputs.track == 'production' && inputs.userFraction != '1.0') && inputs.userFraction || '' }}
